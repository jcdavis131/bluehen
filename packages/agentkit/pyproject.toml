[project]
name = "agentkit"
version = "0.1.0"
description = "Autonomous agent teams for the SynthaEmbed org: GLM-powered tool-calling runtime + Data Harvesting, R&D, Operations teams (Spec 0014)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.8",
    "datalab",
    "runboard",
]

[tool.uv.sources]
datalab = { workspace = true }
runboard = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentkit"]

[tool.ruff]
line-length = 100
