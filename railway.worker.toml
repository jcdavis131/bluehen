# Railway config for the worker service (ADR-002)
# In Railway dashboard: duplicate repo service → name "worker" → set start command: worker
# Or link this file per-service in Railway settings if using config path override.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.limitOverride.containers]
cpu = 2
memoryBytes = 4294967296
