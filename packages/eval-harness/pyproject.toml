[project]
name = "eval-harness"
version = "0.1.0"
description = "Intrinsic + extrinsic eval gates for ASN org models"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "numpy>=1.26",
    "asn-engine",
]

[tool.uv.sources]
asn-engine = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["eval_harness"]

[project.optional-dependencies]
model = ["transformers>=4.44", "tokenizers>=0.19"]

[tool.pytest.ini_options]
testpaths = ["tests"]
