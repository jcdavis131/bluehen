<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blue Hen RE — Task Dashboard</title>
  <style>
    :root {
      --bg: #1a1814; --surface: #242019; --border: #3d3629;
      --text: #e8e2d6; --muted: #9a9285; --accent: #5cb87a;
      --warn: #e8c547; --danger: #e85d4c; --research: #3d8bfd;
      --font: "Segoe UI", system-ui, sans-serif;
      --mono: "Cascadia Code", "Consolas", monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; }
    .shell { max-width: 960px; margin: 0 auto; padding: 24px 20px 48px; }
    header { border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
    .eyebrow { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    h1 { font-size: 1.75rem; margin: 8px 0 4px; font-weight: 600; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; font-size: 0.8125rem; }
    .toolbar label { cursor: pointer; background: var(--surface); border: 2px solid var(--border); padding: 8px 14px; border-radius: 4px; }
    .toolbar label:hover { border-color: var(--accent); }
    input[type=file] { display: none; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat { background: var(--surface); border: 2px solid var(--border); border-radius: 4px; padding: 12px; }
    .stat__label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat__value { font-size: 1.4rem; font-weight: 700; }
    section { margin-bottom: 28px; }
    h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 0 0 10px; font-family: var(--mono); }
    .task-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    .task { background: var(--surface); border: 2px solid var(--border); border-radius: 4px; padding: 12px 14px; font-size: 0.875rem; }
    .task.done { opacity: 0.5; text-decoration: line-through; }
    .task.wip { border-color: var(--warn); }
    .task.waiting { border-color: var(--danger); }
    .task__title { font-weight: 600; }
    .task__sub { font-size: 0.8125rem; color: var(--muted); margin-top: 4px; padding-left: 12px; border-left: 2px solid var(--border); }
    .empty { color: var(--muted); font-size: 0.875rem; font-style: italic; }
    footer { margin-top: 32px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); font-family: var(--mono); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="eyebrow">Circuit HQ · Productivity</div>
      <h1>Task Dashboard</h1>
    </header>

    <div class="toolbar">
      <label for="tasks-file">Load TASKS.md</label>
      <input type="file" id="tasks-file" accept=".md,text/markdown" />
      <span id="status" class="eyebrow">Open TASKS.md or load file to refresh</span>
    </div>

    <div class="stats" id="stats"></div>
    <div id="sections"></div>

    <footer>
      Source of truth: <a href="TASKS.md">TASKS.md</a> · Edit in repo or Cursor ·
      Memory: <a href="CLAUDE.md">CLAUDE.md</a> ·
      Sync via <code>/productivity:update</code>
    </footer>
  </div>

  <script>
    const SECTIONS = ["Active", "Waiting On", "Someday", "Done"];

    function parseTasks(md) {
      const out = Object.fromEntries(SECTIONS.map(s => [s, []]));
      let current = null;
      for (const line of md.split("\n")) {
        const h = line.match(/^## (.+)$/);
        if (h && SECTIONS.includes(h[1])) { current = h[1]; continue; }
        if (!current) continue;
        const item = line.match(/^- \[([ x~])\] \*\*(.+?)\*\*(.*)$/);
        if (item) {
          out[current].push({
            done: item[1] === "x",
            wip: item[1] === "~",
            title: item[2].replace(/~~/g, ""),
            tail: item[3].trim(),
            subs: [],
          });
          continue;
        }
        const sub = line.match(/^  - (.+)$/);
        if (sub && out[current].length) {
          out[current][out[current].length - 1].subs.push(sub[1]);
        }
      }
      return out;
    }

    function render(data) {
      const active = data["Active"].filter(t => !t.done).length;
      const waiting = data["Waiting On"].length;
      const someday = data["Someday"].length;
      const done = data["Done"].length;

      document.getElementById("stats").innerHTML = `
        <div class="stat"><div class="stat__label">Active</div><div class="stat__value">${active}</div></div>
        <div class="stat"><div class="stat__label">Waiting</div><div class="stat__value">${waiting}</div></div>
        <div class="stat"><div class="stat__label">Someday</div><div class="stat__value">${someday}</div></div>
        <div class="stat"><div class="stat__label">Done</div><div class="stat__value">${done}</div></div>
      `;

      document.getElementById("sections").innerHTML = SECTIONS.map(name => {
        const items = data[name];
        const cls = name === "Waiting On" ? "waiting" : "";
        const list = items.length
          ? items.map(t => {
              const c = [t.done ? "done" : "", t.wip ? "wip" : "", name === "Waiting On" ? "waiting" : ""].filter(Boolean).join(" ");
              const subs = t.subs.map(s => `<div class="task__sub">${s}</div>`).join("");
              const tail = t.tail ? `<div class="task__sub">${t.tail.replace(/^— /, "")}</div>` : "";
              return `<li class="task ${c}"><div class="task__title">${t.title}</div>${tail}${subs}</li>`;
            }).join("")
          : `<p class="empty">None</p>`;
        return `<section><h2>${name}</h2><ul class="task-list">${list}</ul></section>`;
      }).join("");
    }

    async function loadFromPath() {
      try {
        const res = await fetch("TASKS.md");
        if (!res.ok) throw new Error("fetch failed");
        const md = await res.text();
        render(parseTasks(md));
        document.getElementById("status").textContent = "Loaded TASKS.md";
      } catch {
        document.getElementById("status").textContent = "Use Load TASKS.md (file:// needs picker) or serve repo locally";
      }
    }

    document.getElementById("tasks-file").addEventListener("change", e => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        render(parseTasks(r.result));
        document.getElementById("status").textContent = `Loaded ${f.name}`;
      };
      r.readAsText(f);
    });

    loadFromPath();
  </script>
</body>
</html>
