name: OKF knowledge refresh

# The personal Agent OS curator (Spec: OKF-001): weekly, the literature
# radar pulls fresh arXiv papers, okf_personal.py turns lever-relevant
# ones into OKF notes and re-embeds the semantic map that jcamd.com
# renders. Runs machine-independently so the wiki grows even when every
# laptop is off. Curated files are never clobbered (write_note guards).

on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU torch + transformers
        run: |
          pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet transformers numpy

      - name: Run the literature radar (stdlib-only)
        run: python scripts/arxiv_literature_radar.py

      - name: Curate the OKF knowledge base + rebuild the semantic map
        env:
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
        run: python scripts/okf_personal.py

      - name: Commit growth (only when something changed)
        run: |
          git config user.name "okf-curator[bot]"
          git config user.email "okf-curator@users.noreply.github.com"
          git add knowledge/personal
          git add -f data/literature/radar_latest.json data/literature/radar_latest.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no growth this week — honest no-op"
          else
            git commit -m "okf: weekly knowledge refresh (radar -> notes -> semantic map)"
            git push
          fi
