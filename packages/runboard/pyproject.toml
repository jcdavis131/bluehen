[project]
name = "runboard"
version = "0.1.0"
description = "Lightweight W&B-style experiment tracking: runs, metrics, ASN telemetry (effective rank, R2D curvature)"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pydantic>=2.8",
]

[project.optional-dependencies]
api = ["fastapi>=0.115", "uvicorn[standard]>=0.30"]
dev = ["pytest>=8", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["runboard"]

[tool.ruff]
line-length = 100
