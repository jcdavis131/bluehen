[project]
name = "asn-engine"
version = "0.1.0"
description = "AwakenedSleepNet: collapse-resistant contrastive embedding engine"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "numpy>=1.26",
]

[project.optional-dependencies]
model = ["transformers>=4.44", "tokenizers>=0.19"]
dev = ["pytest>=8", "ruff>=0.6"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asn_engine"]

[tool.ruff]
line-length = 100
