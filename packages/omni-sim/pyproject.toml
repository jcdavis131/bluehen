[project]
name = "omni-sim"
version = "0.1.0"
description = "Omni-market paper-trading simulation, SmartSearch retrieval, and KAG trajectories"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["omni_sim"]

[tool.pytest.ini_options]
testpaths = ["tests"]
